# models.yaml - OpenVINO NPU API Model Registry
# 
# Instructions:
# 1. Download models using: python scripts/download_prebuilt.py <alias>
# 2. Uncomment entries for models you have downloaded
# 3. Ensure 'name' matches exactly what you use in API calls
# 4. Keep indentation: 2 spaces for list items, 4 spaces for properties
#
# ⚠️ YAML is indentation-sensitive. Use spaces only, never tabs.

models:
  # ✅ Qwen 2.5 1.5B - Balanced speed/quality (RECOMMENDED STARTING POINT)
  # Download: python scripts/download_prebuilt.py qwen2.5-1.5b
  - name: qwen2.5-1.5b-npu
    path: ./models/qwen2.5-1.5b-npu
    task: chat
    input_type: text
    device: NPU
    preprocess_fn: default_genai
    postprocess_fn: default_genai
    max_tokens: 1024
    context_length: 32768

