# Model registry – add new models here with zero code changes.
# Each entry is fully self-describing: path, task, device, limits.
#
# Supported task_type values: chat | response | embedding
# Supported device_preference: NPU | GPU | CPU  (NPU strongly recommended)
# preprocessor / postprocessor: default_genai | custom
#   If custom, provide preprocessor_path / postprocessor_path pointing to
#   a Python module with process(input) -> str  signature.

models:

  # ---------------------------------------------------------------------------
  # Qwen3 2.5B – primary generation model
  # ---------------------------------------------------------------------------
  - name: qwen3-2.5b
    path: /models/Qwen3-2.5B-OV           # directory containing OV IR + tokenizer
    task_type: chat
    device_preference: NPU
    max_tokens: 2048
    context_window: 32768
    preprocessor: default_genai
    postprocessor: default_genai

  # ---------------------------------------------------------------------------
  # Qwen2.5 1.5B – lightweight generation model
  # ---------------------------------------------------------------------------
  - name: qwen2.5-1.5b
    path: /models/Qwen2.5-1.5B-Instruct-OV
    task_type: chat
    device_preference: NPU
    max_tokens: 2048
    context_window: 32768
    preprocessor: default_genai
    postprocessor: default_genai

  # ---------------------------------------------------------------------------
  # Gemma 4 2B – alternative generation model
  # ---------------------------------------------------------------------------
  - name: gemma4-2b
    path: /models/gemma-4-2b-it-OV
    task_type: chat
    device_preference: NPU
    max_tokens: 2048
    context_window: 8192
    preprocessor: default_genai
    postprocessor: default_genai

  # ---------------------------------------------------------------------------
  # BGE-M3 Embedding – optional; /v1/embeddings exposed only when this is present
  # ---------------------------------------------------------------------------
  - name: bge-m3
    path: /models/bge-m3-OV
    task_type: embedding
    device_preference: NPU
    max_tokens: 512
    context_window: 8192
    preprocessor: default_genai
    postprocessor: default_genai
