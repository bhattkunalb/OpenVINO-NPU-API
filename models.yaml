# Model registry – add new models here with zero code changes.
#
# Spec-required fields per entry:
#   name:           unique string identifier
#   path:           absolute path to OV IR directory (*.xml + *.bin) or GenAI model dir
#   task:           chat | completion | embedding | vision
#   input_type:     text | image | tensor
#   device:         NPU (default) | CPU | GPU
#   preprocess_fn:  default_genai | custom:<module.function>
#   postprocess_fn: default_genai | custom:<module.function>
#   max_tokens:     maximum generation tokens
#   context_length: context window in tokens

models:

  - name: qwen2.5-3b-brain-ov-stateful
    path: ./models/qwen2.5-3b-brain-ov-stateful
    task: chat
    input_type: text
    device: NPU
    preprocess_fn: default_genai
    postprocess_fn: default_genai
    max_tokens: 2048
    context_length: 32768

  - name: qwen2.5-1.5b-worker-ov-stateful
    path: ./models/qwen2.5-1.5b-worker-ov-stateful
    task: chat
    input_type: text
    device: NPU
    preprocess_fn: default_genai
    postprocess_fn: default_genai
    max_tokens: 1024
    context_length: 32768

  - name: phi-3-mini-verifier-ov-stateful
    path: ./models/phi-3-mini-verifier-ov-stateful
    task: chat
    input_type: text
    device: NPU
    preprocess_fn: default_genai
    postprocess_fn: default_genai
    max_tokens: 512
    context_length: 4096

  - name: phi-3.5-mini-alt-verifier-ov-stateful
    path: ./models/phi-3.5-mini-alt-verifier-ov-stateful
    task: chat
    input_type: text
    device: NPU
    preprocess_fn: default_genai
    postprocess_fn: default_genai
    max_tokens: 512
    context_length: 4096

