# Model registry – add new models here with zero code changes.
#
# Spec-required fields per entry:
#   name:           unique string identifier
#   path:           absolute path to OV IR directory (*.xml + *.bin) or GenAI model dir
#   task:           chat | completion | embedding | vision
#   input_type:     text | image | tensor
#   device:         NPU (default) | CPU | GPU
#   preprocess_fn:  default_genai | custom:<module.function>
#   postprocess_fn: default_genai | custom:<module.function>
#   max_tokens:     maximum generation tokens
#   context_length: context window in tokens

models:

  # ---------------------------------------------------------------------------
  # Qwen3 2.5B – primary generation model
  # ---------------------------------------------------------------------------
  - name: qwen3-2.5b
    path: /models/Qwen3-2.5B-OV
    task: chat
    input_type: text
    device: NPU
    preprocess_fn: default_genai
    postprocess_fn: default_genai
    max_tokens: 2048
    context_length: 32768

  # ---------------------------------------------------------------------------
  # Qwen2.5 1.5B – lightweight generation model
  # ---------------------------------------------------------------------------
  - name: qwen2.5-1.5b
    path: /models/Qwen2.5-1.5B-Instruct-OV
    task: chat
    input_type: text
    device: NPU
    preprocess_fn: default_genai
    postprocess_fn: default_genai
    max_tokens: 2048
    context_length: 32768

  # ---------------------------------------------------------------------------
  # Gemma 4 2B – alternative generation model
  # ---------------------------------------------------------------------------
  - name: gemma4-2b
    path: /models/gemma-4-2b-it-OV
    task: chat
    input_type: text
    device: NPU
    preprocess_fn: default_genai
    postprocess_fn: default_genai
    max_tokens: 2048
    context_length: 8192

  # ---------------------------------------------------------------------------
  # BGE-M3 Embedding – optional; /v1/embeddings only exposed when present
  # ---------------------------------------------------------------------------
  - name: bge-m3
    path: /models/bge-m3-OV
    task: embedding
    input_type: text
    device: NPU
    preprocess_fn: default_genai
    postprocess_fn: default_genai
    max_tokens: 512
    context_length: 8192
