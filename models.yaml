# models.yaml - Pre-built NPU-optimized models (no export required)
# Download models first using: python scripts/download_prebuilt.py <model_id>

models:
  # Brain: Larger model for complex reasoning
  - name: qwen2.5-3b-npu
    path: ./models/qwen2.5-3b-npu
    task: chat
    input_type: text
    device: NPU
    preprocess_fn: default_genai
    postprocess_fn: default_genai
    max_tokens: 2048
    context_length: 32768
    # Download: python scripts/download_prebuilt.py qwen2.5-3b

  # Worker: Balanced speed/quality for general tasks
  - name: qwen2.5-1.5b-npu
    path: ./models/qwen2.5-1.5b-npu
    task: chat
    input_type: text
    device: NPU
    preprocess_fn: default_genai
    postprocess_fn: default_genai
    max_tokens: 1024
    # Download: python scripts/download_prebuilt.py qwen2.5-1.5b

  # Verifier: Small, fast model for fact-checking
  - name: phi-3-mini-npu
    path: ./models/phi-3-mini-npu
    task: chat
    input_type: text
    device: NPU
    preprocess_fn: default_genai
    postprocess_fn: default_genai
    max_tokens: 512
    # Download: python scripts/download_prebuilt.py phi-3-mini

  # Alt Verifier: Meta's efficient 1B model
  - name: llama-3.2-1b-npu
    path: ./models/llama-3.2-1b-npu
    task: chat
    input_type: text
    device: NPU
    preprocess_fn: default_genai
    postprocess_fn: default_genai
    max_tokens: 512
    # Download: python scripts/download_prebuilt.py llama-3.2-1b
